<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ETCH-A-SKETCH</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Monomaniac+One">
        <script src="script.js" defer></script>
    </head>

    <body>
        <header>
            <h1 id="header-title">ETCH-A-SKETCH</h1>
        </header>

        <main>
            <section id="customize-section"> 
                <input type="color" id="colorpicker" value="#000000">
                <button id="rainbow-button">RAINBOW</button>
                <button id="grid-lines-button">GRID LINES</button>
                <button id="eraser-button">ERASER</button>
                <button id="clear-button">CLEAR</button>
                <div id="grid-size-container">
                    <input id="grid-size-input" type="range" min="1" max="64" value="16">
                    <div id="grid-size-display">16 x 16</div>
                </div>
            </section>
            <section id="grid-section">
                <div id="grid-container"></div>
            </section>
        </main>

        <footer id="footer">
            &copy; Copyright 2023 cocoxcomputerscience@gmail.com
        </footer>
    </body>
</html>
