<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>ETCH-A-SKETCH</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>

    <body>
        <header>
            <h1 id="header-title">ETCH-A-SKETCH</h1>
        </header>

        <main>
            <section id="customize-section"> 
                <h2>CUSTOMIZE</h2>
                <button>RAINBOW</button>
                <button>GRID LINES</button>
                <button>ERASER</button>
                <button>CLEAR</button>
                <div id="grid-size-container">
                    <input id="grid-size-toggle" type="range" min="1" max="64" value="16">
                    <div id="grid-size">16 x 16</div>
                </div>
            </section>
            <section id="grid-section">
                <div id="grid-container"></div>
            </section>
        </main>

        <footer id="footer">
            &copy; Copyright 2023 cocoxcomputerscience@gmail.com
        </footer>
    </body>
</html>
